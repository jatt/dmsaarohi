name: CI/CD Full Stack Pipeline to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies and Build Frontend
        run: |
          cd client
          npm ci
          npm run build
          cd ..

      - name: Clear existing code on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Make sure nginx directory exists and is writable by ec2-user
            sudo mkdir -p /usr/share/nginx/html
            sudo chown -R ec2-user:ec2-user /usr/share/nginx/html
            
            # Clear Nginx Web Root safely
            sudo rm -rf /usr/share/nginx/html/* || true
            
            # Prepare backend directory
            mkdir -p /home/ec2-user/dmsaarohi-backend
            sudo rm -rf /home/ec2-user/dmsaarohi-backend/* || true

      - name: Deploy Frontend Build to Nginx
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/dist"
          target: "/usr/share/nginx/html/"
          strip_components: 2

      - name: Deploy Backend to EC2 Home
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "server"
          target: "/home/ec2-user/dmsaarohi-backend/"
          strip_components: 1

      - name: Install Backend Packages & Restart Server (Optional)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Check if Node is installed on EC2, if not we will skip running the backend
            if command -v npm &> /dev/null; then
              cd /home/ec2-user/dmsaarohi-backend/
              npm install
              
              # Restart server using pm2 if installed
              if command -v pm2 &> /dev/null; then
                pm2 restart server || pm2 start src/server.js --name "server"
              else
                echo "PM2 is not installed. You may need to run the server manually."
              fi
            else
              echo "Node.js is not installed on the EC2 instance yet. Backend will not start automatically."
            fi
